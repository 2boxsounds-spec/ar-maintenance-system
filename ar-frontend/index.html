<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Maintenance - Bournemouth Buses</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            z-index: 100;
        }
        #fault-info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 100;
            max-width: 400px;
        }
        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .login-box input {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #4ecdc4; color: #000; }
        .btn-danger { background: #ff6b6b; color: #fff; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00d4ff; margin-bottom: 20px;">🔧 AR Maintenance</h2>
            <p style="color: #888; margin-bottom: 20px;">Bournemouth Buses Depot</p>
            <input type="text" id="username" placeholder="Username" />
            <input type="password" id="password" placeholder="Password" />
            <button onclick="login()">Login</button>
            <p id="login-error" style="color: #ff6b6b; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <strong id="user-display">User</strong>
                <span id="bay-display" style="color: #888; margin-left: 10px;"></span>
            </div>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
        <div style="margin-top: 10px; font-size: 0.9em; color: #888;">
            Point camera at markers to detect faults
        </div>
    </div>

    <!-- Fault Info Panel -->
    <div id="fault-info">
        <h3 id="fault-title">Fault Title</h3>
        <p id="fault-desc">Description</p>
        <p><strong>Status:</strong> <span id="fault-status">open</span></p>
        <div style="margin-top: 15px;">
            <button class="btn btn-success" onclick="resolveFault()">Mark Resolved</button>
            <button class="btn btn-danger" onclick="closeFaultInfo()">Close</button>
        </div>
    </div>

    <!-- AR Scene -->
    <div id="ar-scene" style="display: none;">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
            <!-- Hiro Marker -->
            <a-marker preset="hiro" id="hiro-marker">
                <a-text value="Fault Detected" position="0 0.5 0" scale="2 2 2" color="white"></a-text>
            </a-marker>
            
            <!-- Kanji Marker -->
            <a-marker preset="kanji" id="kanji-marker">
                <a-text value="Fault Detected" position="0 0.5 0" scale="2 2 2" color="white"></a-text>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        let authToken = null;
        let currentUser = null;
        let currentFault = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('ui-overlay').style.display = 'block';
                    document.getElementById('ar-scene').style.display = 'block';
                    document.getElementById('user-display').textContent = data.user.username;
                    document.getElementById('bay-display').textContent = data.user.assignedBay || 'Supervisor';
                    loadFaults();
                } else {
                    document.getElementById('login-error').textContent = data.error;
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('login-error').textContent = 'Connection error';
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('ui-overlay').style.display = 'none';
            document.getElementById('ar-scene').style.display = 'none';
        }

        async function loadFaults() {
            // Load faults for current bay
            const response = await fetch('/api/v1/faults', {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            const faults = await response.json();
            console.log('Loaded faults:', faults);
        }

        function showFaultInfo(fault) {
            currentFault = fault;
            document.getElementById('fault-title').textContent = fault.title;
            document.getElementById('fault-desc').textContent = fault.description;
            document.getElementById('fault-status').textContent = fault.status;
            document.getElementById('fault-info').style.display = 'block';
        }

        function closeFaultInfo() {
            document.getElementById('fault-info').style.display = 'none';
            currentFault = null;
        }

        async function resolveFault() {
            if (!currentFault) return;

            try {
                const response = await fetch(`/api/v1/faults/${currentFault.id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'resolved' })
                });

                if (response.ok) {
                    alert('Fault marked as resolved!');
                    closeFaultInfo();
                    loadFaults();
                } else {
                    alert('Failed to update fault');
                }
            } catch (error) {
                alert('Error updating fault');
            }
        }

        // Marker detection events
        document.getElementById('hiro-marker').addEventListener('markerFound', () => {
            console.log('Hiro marker found!');
            // In production, this would query the API for fault data
            showFaultInfo({
                id: 1,
                title: 'Brake Pad Wear',
                description: 'Front left brake pad at 20%',
                status: 'open'
            });
        });
    </script>
</body>
</html>
